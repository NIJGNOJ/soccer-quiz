// ── 유틸 ─────────────────────────────────────────────────────
const QT = 30, RT = 6;
const uid = () => Math.random().toString(36).slice(2, 11);
const mkCode = () => Math.random().toString(36).slice(2, 8).toUpperCase();
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

const PID = localStorage.getItem('sqpid') || uid();
localStorage.setItem('sqpid', PID);

function pickQs(n) {
  const shuffled = [...ALL_QS].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, Math.min(n, shuffled.length));
}

// ── 상태 ────────────────────────────────────────────────────
let S = {
  view:'home', nick:'', joinCode:'', code:'',
  room:null, myAns:null, tLeft:QT, revealCD:RT,
  busy:false, copied:false, err:'',
};

let roomRef=null, timerIv=null, hostTm=null, revealTm=null, revealCDIv=null, lastRound=-1;

// ── Firebase ─────────────────────────────────────────────────
function subRoom(code) {
  if (roomRef) roomRef.off();
  roomRef = db.ref('rooms/'+code);
  roomRef.on('value', snap => {
    const data = snap.val();
    if (!data) return;
    S.room = data;
    if (data.currentRound !== lastRound) { lastRound = data.currentRound; S.myAns = null; }
    if (data.phase === 'question') {
      startTimerUI(data.questionStartTime);
      if (data.hostId === PID) {
        clearTimeout(hostTm);
        const rem = Math.max(0, QT*1000 - (Date.now()-data.questionStartTime));
        hostTm = setTimeout(() => doReveal(code), rem);
      }
    } else { clearInterval(timerIv); }
    if (data.phase === 'reveal') {
      startRevealCD();
      if (data.hostId === PID) { clearTimeout(revealTm); revealTm = setTimeout(() => doNext(code), RT*1000); }
    }
    render();
  });
}

async function putRoom(r) { await db.ref('rooms/'+r.code).set(r); }
async function getRoom(code) { const snap = await db.ref('rooms/'+code).once('value'); return snap.val(); }

function startTimerUI(st) {
  clearInterval(timerIv);
  const tick = () => {
    S.tLeft = Math.max(0, Math.ceil(QT-(Date.now()-st)/1000));
    const el = document.getElementById('tmr');
    if (el) { el.textContent=S.tLeft; el.style.color=S.tLeft>15?'#22c55e':S.tLeft>8?'#fbbf24':'#ef4444'; }
  };
  tick(); timerIv = setInterval(tick, 200);
}
function startRevealCD() {
  clearInterval(revealCDIv); S.revealCD = RT;
  revealCDIv = setInterval(() => {
    S.revealCD = Math.max(0, S.revealCD-1);
    const el = document.getElementById('rcd'); if(el) el.textContent=S.revealCD+'초 후 다음 문제';
  }, 1000);
}

async function doReveal(code) {
  const r = await getRoom(code);
  if (!r || r.phase!=='question') return;
  const cq = r.questions[r.currentRound];
  const players = r.players.map(p => {
    const a = r.answers?.[p.id];
    if (!a || a.optionIndex!==cq.correctIndex) return p;
    const ratio = Math.max(0, 1-a.timeMs/(QT*1000));
    return {...p, score: p.score+Math.round(1000+ratio*500)};
  });
  await putRoom({...r, phase:'reveal', players});
}
async function doNext(code) {
  const r = await getRoom(code);
  if (!r || r.phase!=='reveal') return;
  const nxt = r.currentRound+1;
  if (nxt>=r.roundCount) await putRoom({...r, phase:'finished'});
  else await putRoom({...r, phase:'question', currentRound:nxt, questionStartTime:Date.now(), answers:{}});
}

// ── UI 액션 ──────────────────────────────────────────────────
async function createRoom() {
  if (!S.nick.trim()) { set({err:'닉네임을 입력해주세요'}); return; }
  set({busy:true, err:''});
  const c = mkCode();
  const r = {code:c, hostId:PID, phase:'lobby', roundCount:10, currentRound:0,
    players:[{id:PID,nickname:S.nick.trim(),score:0}], questions:[], questionStartTime:null, answers:{}};
  try { await putRoom(r); S.code=c; subRoom(c); set({view:'lobby',busy:false}); }
  catch(e) { set({err:'방 생성 실패: '+e.message, busy:false}); }
}
async function joinRoom() {
  if (!S.nick.trim()) { set({err:'닉네임을 입력해주세요'}); return; }
  const c = S.joinCode.trim().toUpperCase();
  if (!c) { set({err:'방 코드를 입력해주세요'}); return; }
  set({busy:true, err:''});
  try {
    const r = await getRoom(c);
    if (!r) throw new Error('존재하지 않는 방입니다');
    if (r.players.length>=4) throw new Error('방이 가득 찼습니다 (최대 4인)');
    if (r.phase!=='lobby') throw new Error('이미 게임이 시작된 방입니다');
    if (r.players.find(p=>p.nickname===S.nick.trim())) throw new Error('이미 사용 중인 닉네임입니다');
    const upd = {...r, players:[...r.players,{id:PID,nickname:S.nick.trim(),score:0}]};
    await putRoom(upd); S.code=c; subRoom(c); set({view:'lobby',busy:false});
  } catch(e) { set({err:e.message,busy:false}); }
}
async function setRoundCount(n) {
  const r = await getRoom(S.code); if(r) await putRoom({...r,roundCount:n}).catch(console.error);
}
async function startGame() {
  set({busy:true, err:''});
  try {
    const r = await getRoom(S.code);
    const qs = pickQs(r.roundCount);
    await putRoom({...r, phase:'question', questions:qs, currentRound:0, questionStartTime:Date.now(), answers:{}});
    set({busy:false});
  } catch(e) {
    set({err:'시작 실패: '+e.message, busy:false});
    const r2 = await getRoom(S.code).catch(()=>null);
    if(r2) await putRoom({...r2,phase:'lobby'}).catch(()=>{});
  }
}
async function submitAnswer(idx) {
  if (S.myAns!==null) return;
  S.myAns=idx; render();
  const r = await getRoom(S.code);
  if (!r||r.phase!=='question'||r.answers?.[PID]) return;
  const upd = {...r, answers:{...r.answers,[PID]:{optionIndex:idx,timeMs:Date.now()-r.questionStartTime}}};
  await putRoom(upd);
  if (r.hostId===PID && Object.keys(upd.answers).length>=upd.players.length) { clearTimeout(hostTm); doReveal(S.code); }
}
function copyCode() {
  navigator.clipboard.writeText(S.code).catch(()=>{});
  set({copied:true}); setTimeout(()=>set({copied:false}),2000);
}
function resetAll() {
  if(roomRef) roomRef.off(); roomRef=null;
  clearInterval(timerIv); clearTimeout(hostTm); clearTimeout(revealTm); clearInterval(revealCDIv);
  lastRound=-1;
  S={...S,view:'home',code:'',room:null,myAns:null,tLeft:QT,revealCD:RT,busy:false,err:''};
  render();
}
function set(o) { Object.assign(S,o); render(); }
function updateJoinCode(v) { S.joinCode=v.toUpperCase(); document.getElementById('join-inp').value=S.joinCode; }
function updateNick(v) { S.nick=v; }

// ── 렌더 ────────────────────────────────────────────────────
function render() {
  const room=S.room, phase=room?.phase;
  const isHost=room?.hostId===PID;
  const sorted=[...(room?.players||[])].sort((a,b)=>b.score-a.score);
  const myPlayer=room?.players?.find(p=>p.id===PID);
  const q=room?.questions?.[room?.currentRound];
  const myAD=room?.answers?.[PID];
  let html='';
  if(S.view==='home') html=renderHome();
  else if(!phase||phase==='lobby') html=renderLobby(room,isHost);
  else if(phase==='question'||phase==='reveal') html=renderGame(room,q,myAD,sorted,myPlayer);
  else if(phase==='finished') html=renderFinished(room,sorted);
  document.getElementById('app').innerHTML=html;
}

function renderHome() {
  return `<div class="wrap"><div class="card">
    <div class="title">⚽ 축구 퀴즈</div>
    <div class="sub">최대 4명 · ${ALL_QS.length}문제 내장 · API 불필요</div>
    <input class="inp" id="nick-inp" placeholder="닉네임 (최대 12자)" maxlength="12" value="${esc(S.nick)}"
      oninput="updateNick(this.value)" onkeydown="if(event.key==='Enter')createRoom()" />
    <button class="btn btn-green" onclick="createRoom()" ${S.busy?'disabled':''}>
      ${S.busy?'생성 중...':'🏟️ 방 만들기'}
    </button>
    <div style="display:flex;gap:8px;margin-top:4px">
      <input class="inp" id="join-inp" style="flex:1;margin-bottom:0" placeholder="방 코드 6자리" maxlength="6"
        value="${esc(S.joinCode)}" oninput="updateJoinCode(this.value)" onkeydown="if(event.key==='Enter')joinRoom()" />
      <button class="btn btn-blue" style="margin-bottom:0;width:auto;padding:11px 18px" onclick="joinRoom()" ${S.busy?'disabled':''}>참가</button>
    </div>
    ${S.err?`<div class="err">${esc(S.err)}</div>`:''}
    <div class="foot">서로 다른 PC에서 방 코드로 접속 · Firebase 실시간 동기화</div>
  </div></div>`;
}

function renderLobby(room,isHost) {
  return `<div class="wrap"><div class="card">
    <div class="title">🏟️ 대기실</div>
    <div class="sub">아래 코드를 친구에게 공유하세요</div>
    <div class="room-code">${S.code}</div>
    <button class="btn btn-blue" style="margin-bottom:20px" onclick="copyCode()">
      ${S.copied?'✅ 복사 완료!':'📋 코드 복사하기'}
    </button>
    ${isHost?`
      <div class="section-label">문제 수 선택</div>
      <div style="display:flex;gap:8px;margin-bottom:20px">
        ${[10,20,30].map(n=>`<button class="round-btn${room.roundCount===n?' selected':''}" onclick="setRoundCount(${n})">${n}</button>`).join('')}
      </div>
    `:`<div style="text-align:center;color:#4a6580;font-size:14px;margin-bottom:16px">문제 수: <b style="color:#22c55e">${room?.roundCount}문제</b></div>`}
    <div class="section-label">참가자 (${room?.players?.length}/4)</div>
    ${room?.players?.map(p=>`
      <div class="player-row${p.id===PID?' me':''}">
        <span style="font-size:18px">${p.id===room.hostId?'👑':'👤'}</span>
        <span style="font-weight:600;flex:1">${esc(p.nickname)}</span>
        ${p.id===room.hostId?'<span class="tag-host">방장</span>':''}
        ${p.id===PID?'<span class="tag-me">나</span>':''}
      </div>`).join('')}
    ${isHost?`
      <button class="btn btn-green" style="margin-top:12px" onclick="startGame()" ${S.busy?'disabled':''}>
        ${S.busy?'⏳ 시작 중...':`🚀 게임 시작! (${room?.roundCount}문제)`}
      </button>
    `:`<div class="waiting-box">⌛ 방장이 게임을 시작할 때까지 대기 중...</div>`}
    ${S.err?`<div class="err">${esc(S.err)}</div>`:''}
  </div></div>`;
}

function renderGame(room,q,myAD,sorted,myPlayer) {
  const phase=room.phase, cur=room.currentRound, total=room.roundCount;
  const isCorrect=myAD?.optionIndex===q?.correctIndex;
  const ansCount=Object.keys(room.answers||{}).length;
  const optSt=i=>{
    if(phase==='question') return S.myAns===i?'selected':'default';
    if(i===q.correctIndex) return 'correct';
    if(myAD?.optionIndex===i) return 'wrong';
    return 'other';
  };
  const bars=total<=20
    ?Array.from({length:total}).map((_,i)=>`<div class="prog-bar" style="background:${i<cur?'#22c55e':i===cur?'#3b82f6':'#0f2030'}"></div>`).join('')
    :`<div class="prog-bar" style="width:100%;background:#071222"><div style="height:5px;width:${(cur/total)*100}%;background:linear-gradient(90deg,#22c55e,#3b82f6);border-radius:3px"></div></div>`;
  return `<div class="wrap"><div class="card wide">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <span style="color:#4a6580;font-size:13px;font-weight:700">${cur+1} / ${total}</span>
      ${phase==='reveal'
        ?`<span id="rcd" style="font-size:13px;color:#4a6580">${S.revealCD}초 후 다음 문제</span>`
        :`<span style="font-size:13px;color:#22c55e;font-weight:700">${(myPlayer?.score||0).toLocaleString()}점</span>`}
    </div>
    <div class="progress-wrap">${bars}</div>
    ${phase==='question'
      ?`<div id="tmr" class="timer" style="color:${S.tLeft>15?'#22c55e':S.tLeft>8?'#fbbf24':'#ef4444'}">${S.tLeft}</div>`
      :`<div style="text-align:center;font-size:22px;font-weight:800;margin-bottom:6px;color:${isCorrect?'#22c55e':myAD?'#ef4444':'#fbbf24'}">${isCorrect?'🎉 정답!':myAD?'❌ 오답':'⏰ 시간 초과'}</div>`}
    <div class="q-text">${esc(q?.question||'')}</div>
    <div class="grid2">
      ${(q?.options||[]).map((opt,i)=>`
        <button class="opt opt-${optSt(i)}" onclick="${phase==='question'?`submitAnswer(${i})`:''}">
          <span style="font-size:11px;opacity:.6;margin-right:5px;font-family:monospace">${['A','B','C','D'][i]}</span>${esc(opt)}
        </button>`).join('')}
    </div>
    ${phase==='reveal'&&q?.explanation?`<div class="explanation">💡 ${esc(q.explanation)}</div>`:''}
    ${phase==='question'?`<div style="text-align:center;color:#4a6580;font-size:13px;margin-top:14px">${S.myAns!==null?'✅ 답변 완료 · 다른 플레이어를 기다리는 중...':ansCount+'/'+room.players.length+'명 답변 완료'}</div>`:''}
    ${phase==='reveal'?`
      <div style="margin-top:16px">
        <div class="section-label">현재 순위</div>
        ${sorted.map((p,i)=>`
          <div class="score-row${i===0?' gold':p.id===PID?' mine':''}">
            <span style="font-size:${i===0?26:20}px;min-width:28px">${['🥇','🥈','🥉','4️⃣'][i]}</span>
            <span style="flex:1;font-weight:600">${esc(p.nickname)}${p.id===PID?' (나)':''}</span>
            <span style="font-weight:800;color:${i===0?'#22c55e':'#e2e8f0'}">${p.score.toLocaleString()}점</span>
          </div>`).join('')}
      </div>`:''}
  </div></div>`;
}

function renderFinished(room,sorted) {
  return `<div class="wrap"><div class="card">
    <div style="font-size:48px;text-align:center;margin-bottom:8px">🏆</div>
    <div class="title">최종 결과</div>
    <div class="sub">${room.roundCount}문제 완료 · 수고하셨습니다!</div>
    ${sorted.map((p,i)=>`
      <div class="score-row${i===0?' gold':p.id===PID?' mine':''}">
        <span style="font-size:${i===0?28:22}px">${['🥇','🥈','🥉','4️⃣'][i]}</span>
        <span style="flex:1;margin-left:10px;font-weight:700;font-size:${i===0?17:15}px">${esc(p.nickname)}${p.id===PID?' (나)':''}</span>
        <span style="font-weight:900;font-size:${i===0?22:17}px;color:${i===0?'#22c55e':'#e2e8f0'}">${p.score.toLocaleString()}점</span>
      </div>`).join('')}
    <button class="btn btn-green" style="margin-top:16px" onclick="resetAll()">🔄 처음으로 돌아가기</button>
  </div></div>`;
}

render();
</script>
</body>
</html>
